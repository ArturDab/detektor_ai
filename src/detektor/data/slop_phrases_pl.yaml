# Leksykon fraz typowych dla "AI slop" w jezyku polskim.
# Mozna rozszerzac BEZ zmiany kodu. Kazdy wpis:
#   pattern    - wyrazenie regularne (IGNORECASE, UNICODE); uzywaj rdzeni \w*
#   message    - krotki opis po polsku (tooltip)
#   suggestion - propozycja poprawy (opcjonalnie)
#   severity   - info | low | medium | high (domyslnie medium)
#   weight     - waga w gestosci (domyslnie 1.0)
phrases:
  - pattern: '\bwarto (?:zauwaŇľyńá|podkreŇõlińá|pamińôtańá|wspomnieńá|zaznaczyńá|dodańá|wiedzieńá|nadmienińá|mieńá na uwadze)\b'
    message: 'Frazes-wypelniacz naduzywany przez modele AI.'
    suggestion: 'Usun lub przejdz wprost do konkretu.'
    severity: medium
  - pattern: '\bwarto (?:r√≥wnieŇľ |takŇľe |przy tym )?zwr√≥cińá uwagńô\b'
    message: 'Pusty zwrot wprowadzajacy ("warto zwrocic uwage").'
